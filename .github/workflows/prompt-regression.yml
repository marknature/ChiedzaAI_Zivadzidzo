name: Prompt regression
on:
  pull_request:
    paths:
      - 'backend/schemas/**'
      - 'backend/services/openaiService.js'
      - 'backend/tests/**'
      - '.github/workflows/prompt-regression.yml'
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test -- --runInBand
      - name: Prove cross-institution RLS isolation
        if: ${{ secrets.RLS_TEST_USER_A_TOKEN != '' && secrets.RLS_TEST_USER_B_INSTITUTION_ID != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RLS_TEST_USER_A_TOKEN: ${{ secrets.RLS_TEST_USER_A_TOKEN }}
          RLS_TEST_USER_B_INSTITUTION_ID: ${{ secrets.RLS_TEST_USER_B_INSTITUTION_ID }}
        run: npm test -- --runInBand tests/rlsIsolation.test.js
